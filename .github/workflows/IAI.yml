name: Performance Regression Check

on:
  pull_request:
    branches: ["**"]

permissions:
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Install iai-callgrind-runner
        run: cargo install iai-callgrind-runner --version 0.14.2

      # 1. Bench sur la branche PR
      - name: Run PR Benchmark
        run: |
          cargo bench --bench bench --all-features > pr_bench.txt
          # On sauvegarde le fichier de sortie callgrind s'il existe
          cp -r target/iai/ /tmp/pr_results || true

# 2. Bench sur la branche CIBLE (ex: main ou develop)
      - name: Run Target Branch Benchmark
        run: |
          # On bascule sur la branche cible de la PR (ex: main)
          git checkout ${{ github.event.pull_request.base.ref }}
          
          # On "emprunte" la configuration de bench de la PR
          git checkout ${{ github.event.pull_request.head.sha }} -- Cargo.toml
          git checkout ${{ github.event.pull_request.head.sha }} -- benches/bench.rs
          
          # On lance le bench sur le code de la branche cible
          # mais avec les outils de la PR
          cargo bench --bench bench --all-features > target_bench.txt

      # 3. Génération du rapport via un script simple
      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prBench = fs.readFileSync('pr_bench.txt', 'utf8');
            const mainBench = fs.readFileSync('main_bench.txt', 'utf8');
            
            const body = `
            ### 📊 Benchmark Report (Instruction Counts)
            
            **Current PR:**
            \`\`\`
            ${prBench}
            \`\`\`
            
            **Main Branch (Reference):**
            \`\`\`
            ${mainBench}
            \`\`\`
            
            *Note: Measurements are done via Valgrind/Callgrind for deterministic results.*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })